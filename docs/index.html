<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex Rush</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
        }
        .icon {
            width: 150px;
            height: 150px;
            border-radius: 20%;
            margin-bottom: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 {
            margin: 0;
            font-size: 3rem;
            letter-spacing: 2px;
        }
        .links {
            margin-top: 40px;
            display: flex;
            gap: 30px;
        }
        a {
            color: #8bb4f7;
            text-decoration: none;
            font-size: 1.1rem;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        a:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <img class="icon" src="icon.jpg" alt="Cortex Rush Icon">
    <h1>CORTEX RUSH</h1>
    
    <div class="links">
        <a href="privacy/">Privacy Policy</a>
        <a href="termsofservice/">Terms of Service</a>
